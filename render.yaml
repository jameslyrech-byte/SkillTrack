services:
  - type: web
    name: skilltrack
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: skilltrack-db
          property: connectionString
    healthCheckPath: /
    
databases:
  - name: skilltrack-db
    databaseName: skilltrack
    user: skilltrack