services:
  - type: web
    name: skilltrack
    runtime: python
    # Dependencies and static assets are prepared during the build. Database
    # migrations run immediately before each release, when DATABASE_URL is
    # available from the attached Render Postgres instance.
    buildCommand: bash build.sh
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: SECURE_SSL_REDIRECT
        value: True
      - key: ALLOWED_HOSTS
        value: skilltrack.onrender.com,localhost,127.0.0.1
      - key: DATABASE_URL
        fromDatabase:
          name: skilltrack-db
          property: connectionString
    healthCheckPath: /
databases:
  - name: skilltrack-db
    plan: free
    databaseName: skilltrack
    user: skilltrack
