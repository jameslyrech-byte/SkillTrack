<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Recovery</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #eef2f5;
            color: #17212b;
            font-family: Arial, Helvetica, sans-serif;
        }
        main {
            width: min(92vw, 420px);
            padding: 30px;
            background: #fff;
            border: 1px solid #b8c1cc;
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(23, 33, 43, 0.12);
        }
        h1 { margin: 0 0 18px; text-align: center; font-size: 1.55rem; }
        label { display: block; margin-bottom: 6px; font-weight: 700; }
        input {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid #7c8794;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            min-height: 46px;
            margin-top: 18px;
            border: 0;
            border-radius: 6px;
            background: #0f766e;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        p { color: #5b6672; }
        a { color: #0a5c55; font-weight: 700; }
    </style>
</head>
<body>
    <main>
        <h1>Password Recovery</h1>
        <p>Enter your email address and a recovery email will be sent if the account exists.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.email.label_tag }}
            {{ form.email }}
            <button type="submit">Send Recovery Email</button>
        </form>
        <p><a href="{% url 'login' %}">Return to Sign In</a></p>
    </main>
</body>
</html>
