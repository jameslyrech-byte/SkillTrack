<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        :root {
            --bg: #f0f4f3;
            --panel: #ffffff;
            --text: #17212b;
            --muted: #5b6672;
            --line: #b8c1cc;
            --primary: #7c3aed;
            --primary-dark: #5b21b6;
            --danger: #b42318;
            --success: #157347;
            --warn: #a15c07;
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }
        .screen {
            width: min(94vw, 460px);
            padding: 32px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(23, 33, 43, 0.12);
        }
        h1 {
            margin: 0 0 24px;
            text-align: center;
            font-size: 1.65rem;
        }
        label {
            display: block;
            margin: 14px 0 6px;
            color: var(--text);
            font-weight: 700;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid #7c8794;
            border-radius: 6px;
            color: var(--text);
            background: #fff;
            font-size: 1rem;
        }
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 18px 0 22px;
            color: var(--muted);
            font-weight: 400;
        }
        .terms input { margin-top: 2px; }
        .button {
            width: 100%;
            min-height: 46px;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .button:disabled {
            background: #a99cc4;
            cursor: not-allowed;
        }
        .meter {
            height: 8px;
            margin-top: 8px;
            overflow: hidden;
            border-radius: 999px;
            background: #e5e7eb;
        }
        .meter span {
            display: block;
            width: 0;
            height: 100%;
            background: var(--danger);
            transition: width 160ms ease, background 160ms ease;
        }
        .strength-text {
            min-height: 20px;
            margin-top: 6px;
            color: var(--muted);
            font-size: 0.9rem;
        }
        .message {
            margin: 0 0 14px;
            padding: 10px 12px;
            border-radius: 6px;
            background: #fef3f2;
            color: var(--danger);
            font-weight: 700;
        }
        .message.success {
            background: #ecfdf3;
            color: var(--success);
        }
        .footer {
            margin: 24px 0 0;
            text-align: center;
            color: var(--muted);
        }
        a { color: var(--primary-dark); font-weight: 700; }
        @media (max-width: 520px) {
            .screen { padding: 24px; }
        }
    </style>
</head>
<body>
    <main class="screen" aria-labelledby="register-title">
        <h1 id="register-title">Create Your Account</h1>

        {% if messages %}
            {% for msg in messages %}
                <div class="message {{ msg.tags }}" role="status">{{ msg }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST" id="register-form" novalidate>
            {% csrf_token %}
            <label for="full_name">Full Name</label>
            <input id="full_name" type="text" name="full_name" value="{{ full_name|default:'' }}" autocomplete="name" required>

            <label for="email">Email Address</label>
            <input id="email" type="email" name="email" value="{{ email|default:'' }}" autocomplete="email" required>

            <label for="password">Password</label>
            <input id="password" type="password" name="password" autocomplete="new-password" required>
            <div class="meter" aria-hidden="true"><span id="strength-bar"></span></div>
            <div class="strength-text" id="strength-text">Use 8+ characters with uppercase, number, and special character.</div>

            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" type="password" name="confirm_password" autocomplete="new-password" required>
            <div class="strength-text" id="match-text"></div>

            <label class="terms" for="terms">
                <input id="terms" type="checkbox" name="terms" required>
                <span>I agree to the Terms &amp; Conditions</span>
            </label>

            <button class="button" id="submit-button" type="submit" disabled>Register</button>
        </form>

        <p class="footer">Already have an account? <a href="{% url 'login' %}">Log In</a></p>
    </main>

    <script>
        const formFields = {
            name: document.getElementById('full_name'),
            email: document.getElementById('email'),
            password: document.getElementById('password'),
            confirm: document.getElementById('confirm_password'),
            terms: document.getElementById('terms')
        };
        const submit = document.getElementById('submit-button');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');
        const matchText = document.getElementById('match-text');

        function passwordScore(value) {
            return [
                value.length >= 8,
                /[A-Z]/.test(value),
                /\d/.test(value),
                /[^A-Za-z0-9]/.test(value)
            ].filter(Boolean).length;
        }

        function syncForm() {
            const score = passwordScore(formFields.password.value);
            const labels = ['Weak', 'Weak', 'Fair', 'Good', 'Strong'];
            const colors = ['#b42318', '#b42318', '#a15c07', '#0f766e', '#157347'];
            strengthBar.style.width = `${score * 25}%`;
            strengthBar.style.background = colors[score];
            strengthText.textContent = formFields.password.value ? `Password strength: ${labels[score]}` : 'Use 8+ characters with uppercase, number, and special character.';

            const passwordsMatch = formFields.password.value && formFields.password.value === formFields.confirm.value;
            matchText.textContent = formFields.confirm.value && !passwordsMatch ? 'Passwords do not match.' : '';
            matchText.style.color = '#b42318';

            submit.disabled = !formFields.name.value.trim()
                || !formFields.email.value.trim()
                || score < 4
                || !passwordsMatch
                || !formFields.terms.checked;
        }

        Object.values(formFields).forEach((field) => field.addEventListener('input', syncForm));
        formFields.terms.addEventListener('change', syncForm);
        syncForm();
    </script>
</body>
</html>
