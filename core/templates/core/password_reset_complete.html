<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #eef2f5;
            color: #17212b;
            font-family: Arial, Helvetica, sans-serif;
        }
        main {
            width: min(92vw, 420px);
            padding: 30px;
            background: #fff;
            border: 1px solid #b8c1cc;
            border-radius: 8px;
            box-shadow: 0 12px 32px rgba(23, 33, 43, 0.12);
        }
        h1 { margin: 0 0 14px; text-align: center; font-size: 1.55rem; }
        p { color: #5b6672; }
        a { color: #0a5c55; font-weight: 700; }
    </style>
</head>
<body>
    <main>
        <h1>Password Reset Complete</h1>
        <p>Your password has been set. You can now sign in with your new password.</p>
        <p><a href="{% url 'login' %}">Return to Sign In</a></p>
    </main>
</body>
</html>
